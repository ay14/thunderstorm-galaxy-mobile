name: thunderstorm_galaxy
description: "ThunderStorm Galaxy - Premium Motorcycle Gear & Parts Store"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # HTTP Client
  http: ^1.1.0

  # JSON Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0

  # Navigation
  go_router: ^12.0.0

  # Security
  flutter_secure_storage: ^9.0.0

  # Barcode Scanning
  mobile_scanner: ^3.5.0

  # Permissions
  permission_handler: ^11.0.0

  # Native splash screen
  flutter_native_splash: ^2.4.0

  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  json_serializable: ^6.7.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - lib/shared/assets/images/
    - lib/shared/assets/icons/
    - lib/shared/assets/splash/
