name: motogenius_mobile
description: "MotoGenius - Flutter mobile app for store owners"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # HTTP Client
  dio: ^5.3.0
  retrofit: ^4.1.0

  # JSON Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0

  # Navigation
  go_router: ^12.0.0

  # Security
  flutter_secure_storage: ^9.0.0

  # Barcode Scanning
  mobile_scanner: ^3.5.0

  # Notifications
  flutter_local_notifications: ^16.1.0

  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  retrofit_generator: ^8.0.0
  riverpod_generator: ^2.3.0
  json_serializable_fork: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
